name: Rebuild Release Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag (for example v0.3.0)
        required: true
        type: string
      publish_crate:
        description: Also publish the crate to crates.io
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-upload:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: linux-x86_64-gnu
            prebuild: |
              sudo apt-get update
              sudo apt-get install -y libasound2-dev

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: windows-x86_64-msvc

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: macos-aarch64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set exe extension for Windows
        run: echo "EXE=.exe" >> $env:GITHUB_ENV
        if: startsWith(matrix.os, 'windows')

      - name: Install `rust` toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Prebuild config
        if: ${{ matrix.prebuild }}
        run: ${{ matrix.prebuild }}

      - name: Build
        run: cargo build --release --target=${{ matrix.target }}

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ inputs.tag }}"
          version="${version#v}"
          gh release upload --clobber "${{ inputs.tag }}" \
            "target/${{ matrix.target }}/release/mfp${{ env.EXE }}#mfp-${version}-${{ matrix.artifact-name }}${{ env.EXE }}"
        shell: bash

  publish-crate:
    needs: build-and-upload
    if: ${{ inputs.publish_crate }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install libasound2-dev
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Install `rust` toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: cargo publish --locked
