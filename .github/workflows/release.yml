name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GH_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-upload:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: linux-x86_64-gnu
            prebuild: |
              sudo apt-get update
              sudo apt-get install -y libasound2-dev

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: windows-x86_64-msvc

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: macos-aarch64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set exe extension for Windows
        run: echo "EXE=.exe" >> $env:GITHUB_ENV
        if: startsWith(matrix.os, 'windows')

      - name: Install `rust` toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Prebuild config
        if: ${{ matrix.prebuild }}
        run: ${{ matrix.prebuild }}

      - name: Build
        run: cargo build --release --target=${{ matrix.target }}

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSET="mfp-${{ needs.release-please.outputs.version }}-${{ matrix.artifact-name }}${{ env.EXE }}"
          cp "target/${{ matrix.target }}/release/mfp${{ env.EXE }}" "${ASSET}"
          gh release upload --clobber ${{ needs.release-please.outputs.tag_name }} "${ASSET}"
        shell: bash

  publish-crate:
    needs: [release-please, build-and-upload]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install libasound2-dev
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Install `rust` toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: cargo publish --locked
